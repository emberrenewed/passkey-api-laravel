services:
  mysql:
    image: mysql:8.0
    container_name: passkey_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: passkey_auth
      MYSQL_USER: passkey_user
      MYSQL_PASSWORD: passkey_secret_123
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: passkey_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root_password_123
    depends_on:
      - mysql

volumes:
  mysql_data:
